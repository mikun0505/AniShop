<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniShop - Xem Anime & Mua Sắm</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3e;
            --accent: #e63946;
            --accent2: #ff6b6b;
            --gold: #ffd60a;
            --text: #e8e8f0;
            --text-dim: #8888aa;
            --gradient: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── NAV ── */
        nav {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; gap: 24px;
            padding: 0 32px; height: 64px;
            background: rgba(10,10,15,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: 'Orbitron', monospace;
            font-weight: 900; font-size: 22px;
            color: var(--accent);
            letter-spacing: 2px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .logo span { color: var(--gold); }
        .nav-tabs { display: flex; gap: 4px; margin-right: auto; }
        .nav-tab {
            padding: 6px 18px; border-radius: 6px; border: none;
            background: transparent; color: var(--text-dim);
            font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .nav-tab:hover, .nav-tab.active {
            background: var(--surface2); color: var(--text);
        }
        .nav-tab.active { color: var(--accent); }

        /* Search */
        .search-wrap { position: relative; }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 8px 14px; width: 280px;
            transition: border-color 0.2s;
        }
        .search-box:focus-within { border-color: var(--accent); }
        .search-box input {
            background: none; border: none; outline: none;
            color: var(--text); font-size: 14px; width: 100%;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .search-box input::placeholder { color: var(--text-dim); }
        .search-icon { color: var(--text-dim); font-size: 16px; flex-shrink: 0; }

        /* Autocomplete dropdown */
        .autocomplete-dropdown {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
            z-index: 200; display: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .autocomplete-dropdown.show { display: block; }
        .autocomplete-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid var(--border);
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: var(--surface); }
        .autocomplete-item img {
            width: 38px; height: 52px; object-fit: cover; border-radius: 4px;
            flex-shrink: 0;
        }
        .autocomplete-item-info { flex: 1; min-width: 0; }
        .autocomplete-item-title {
            font-size: 13px; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .autocomplete-item-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
        .autocomplete-loading { padding: 16px; text-align: center; color: var(--text-dim); font-size: 13px; }

        /* ── SECTIONS ── */
        .section { display: none; }
        .section.active { display: block; }

        /* ── ANIME SECTION ── */
        .hero-banner {
            position: relative; height: 420px; overflow: hidden;
            background: var(--surface);
        }
        .hero-bg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            filter: brightness(0.35) blur(2px);
            transition: all 0.8s ease;
        }
        .hero-content {
            position: absolute; inset: 0;
            display: flex; align-items: flex-end;
            padding: 40px 48px;
            background: linear-gradient(to top, rgba(10,10,15,0.95) 0%, transparent 60%);
        }
        .hero-info { max-width: 520px; }
        .hero-badge {
            display: inline-block; background: var(--accent);
            color: white; font-size: 11px; font-weight: 700;
            letter-spacing: 1.5px; padding: 3px 10px; border-radius: 4px;
            margin-bottom: 10px;
        }
        .hero-title {
            font-family: 'Bebas Neue', cursive; font-size: 48px;
            line-height: 1; color: white; margin-bottom: 10px;
        }
        .hero-meta { display: flex; gap: 16px; color: var(--text-dim); font-size: 13px; margin-bottom: 14px; }
        .hero-meta span { display: flex; align-items: center; gap: 4px; }
        .star { color: var(--gold); }
        .hero-desc { font-size: 14px; color: #bbb; line-height: 1.6; margin-bottom: 20px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hero-btns { display: flex; gap: 12px; }
        .btn-watch {
            display: flex; align-items: center; gap: 8px;
            background: var(--accent); color: white;
            border: none; border-radius: 8px; padding: 10px 24px;
            font-weight: 700; font-size: 14px; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .btn-watch:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(230,57,70,0.4); }
        .btn-info {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.1); color: white;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
            padding: 10px 24px; font-size: 14px; cursor: pointer;
            transition: background 0.2s; font-family: 'Noto Sans JP', sans-serif;
        }
        .btn-info:hover { background: rgba(255,255,255,0.2); }
        .hero-dots { position: absolute; bottom: 16px; right: 48px; display: flex; gap: 8px; }
        .hero-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.3); cursor: pointer; border: none;
            transition: background 0.2s, transform 0.2s;
        }
        .hero-dot.active { background: var(--accent); transform: scale(1.3); }

        /* Grid sections */
        .content-area { padding: 32px 48px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title {
            font-family: 'Bebas Neue', cursive; font-size: 28px;
            letter-spacing: 1px; color: white;
        }
        .section-title span { color: var(--accent); }
        .see-all {
            font-size: 13px; color: var(--accent); cursor: pointer;
            background: none; border: none; font-family: 'Noto Sans JP', sans-serif;
        }
        .see-all:hover { text-decoration: underline; }

        /* Anime card grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        .anime-card {
            cursor: pointer; border-radius: 10px; overflow: hidden;
            background: var(--surface); border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .anime-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
        .anime-card:hover .card-overlay { opacity: 1; }
        .anime-card-img {
            width: 100%; aspect-ratio: 2/3; object-fit: cover;
            display: block; background: var(--surface2);
        }
        .anime-card-img-placeholder {
            width: 100%; aspect-ratio: 2/3;
            background: linear-gradient(135deg, var(--surface2) 0%, #1e1e2e 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
        }
        .card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(230,57,70,0.7) 0%, transparent 50%);
            opacity: 0; transition: opacity 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .card-play {
            width: 44px; height: 44px; border-radius: 50%;
            background: white; display: flex; align-items: center; justify-content: center;
            font-size: 18px; margin-top: -20px;
        }
        .anime-card-info { padding: 10px 12px; }
        .anime-card-title {
            font-size: 13px; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .anime-card-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 4px;
        }
        .anime-card-score { font-size: 12px; color: var(--gold); font-weight: 700; }
        .anime-card-eps { font-size: 11px; color: var(--text-dim); }
        .anime-card-status {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.8); color: var(--gold);
            font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
        }
        .loading-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px;
        }
        .skeleton {
            background: var(--surface2); border-radius: 10px; overflow: hidden;
            border: 1px solid var(--border); animation: shimmer 1.5s infinite;
        }
        .skeleton-img { width: 100%; aspect-ratio: 2/3; }
        .skeleton-line { height: 12px; background: var(--border); border-radius: 4px;
            margin: 12px; }
        .skeleton-line.short { width: 60%; }
        @keyframes shimmer {
            0%,100% { opacity: 0.6; } 50% { opacity: 1; }
        }

        /* ── ANIME DETAIL / WATCH ── */
        .watch-layout {
            display: grid; grid-template-columns: 1fr 320px; gap: 24px;
            padding: 32px 48px;
        }
        .video-container {
            background: #000; border-radius: 12px; overflow: hidden;
            aspect-ratio: 16/9; position: relative;
        }
        .video-placeholder {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 12px; color: var(--text-dim);
        }
        .video-placeholder .big-icon { font-size: 64px; opacity: 0.3; }
        iframe { width: 100%; height: 100%; border: none; }
        .video-info { margin-top: 16px; }
        .video-title { font-family: 'Bebas Neue', cursive; font-size: 28px; }
        .video-meta { color: var(--text-dim); font-size: 13px; margin-top: 4px; display: flex; gap: 16px; }

        /* Sidebar: provider + episodes */
        .watch-sidebar {}
        .sidebar-label {
            font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
            color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px;
        }
        .provider-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .provider-btn {
            padding: 6px 14px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text-dim); font-size: 12px; cursor: pointer;
            transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif;
        }
        .provider-btn:hover { border-color: var(--accent); color: var(--accent); }
        .provider-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }

        .episodes-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden;
        }
        .episodes-header {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .episodes-header span { font-weight: 700; font-size: 14px; }
        .episodes-count { font-size: 12px; color: var(--text-dim); }
        .episodes-list {
            max-height: 480px; overflow-y: auto;
        }
        .episodes-list::-webkit-scrollbar { width: 4px; }
        .episodes-list::-webkit-scrollbar-track { background: var(--surface); }
        .episodes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .episode-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .episode-item:last-child { border-bottom: none; }
        .episode-item:hover { background: var(--surface2); }
        .episode-item.active { background: rgba(230,57,70,0.15); }
        .episode-num {
            width: 36px; height: 36px; border-radius: 8px;
            background: var(--surface2); display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; flex-shrink: 0;
        }
        .episode-item.active .episode-num { background: var(--accent); color: white; }
        .episode-info { flex: 1; min-width: 0; }
        .episode-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .episode-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
        .episodes-load-more {
            width: 100%; padding: 12px; border: none;
            background: var(--surface2); color: var(--accent);
            font-size: 13px; font-weight: 700; cursor: pointer;
            border-top: 1px solid var(--border);
            transition: background 0.2s;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .episodes-load-more:hover { background: rgba(230,57,70,0.15); }
        .episodes-loading {
            padding: 24px; text-align: center; color: var(--text-dim); font-size: 13px;
        }

        /* ── SHOP SECTION ── */
        .shop-banner {
            height: 200px; background: linear-gradient(135deg, #1a1a26 0%, #2a1a2a 100%);
            display: flex; align-items: center; padding: 0 48px; gap: 24px;
            border-bottom: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .shop-banner::before {
            content: ''; position: absolute; right: -100px; top: -100px;
            width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(230,57,70,0.1) 0%, transparent 70%);
        }
        .shop-banner-text h1 {
            font-family: 'Bebas Neue', cursive; font-size: 48px; color: white;
        }
        .shop-banner-text p { color: var(--text-dim); font-size: 14px; margin-top: 6px; }
        .category-filters {
            display: flex; gap: 10px; padding: 20px 48px;
            flex-wrap: wrap;
        }
        .cat-btn {
            padding: 8px 20px; border-radius: 20px;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text-dim); font-size: 13px; cursor: pointer;
            transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif;
        }
        .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
        .cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px; padding: 0 48px 48px;
        }
        .product-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
        .product-img-wrap { position: relative; overflow: hidden; }
        .product-img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            display: block; transition: transform 0.3s;
        }
        .product-card:hover .product-img { transform: scale(1.05); }
        .product-badge {
            position: absolute; top: 10px; left: 10px;
            background: var(--accent); color: white;
            font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
        }
        .product-info { padding: 14px; }
        .product-name { font-size: 14px; font-weight: 700; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-anime { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
        .product-footer { display: flex; align-items: center; justify-content: space-between; }
        .product-price { color: var(--accent); font-weight: 700; font-size: 15px; }
        .product-add {
            width: 30px; height: 30px; border-radius: 8px;
            background: var(--accent); border: none; color: white;
            font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s;
        }
        .product-add:hover { transform: scale(1.1); }

        /* Back button */
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; margin: 20px 48px 0;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 14px;
            cursor: pointer; transition: all 0.15s;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 999;
            background: var(--surface2); border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 14px 20px; border-radius: 8px;
            font-size: 14px; transform: translateX(120%); transition: transform 0.3s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(0); }

        /* Spinner */
        .spinner {
            width: 32px; height: 32px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 80px 20px; color: var(--text-dim);
        }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .empty-state p { font-size: 14px; }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <a class="logo" href="#">ANI<span>SHOP</span></a>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="showSection('anime')">🎬 Anime</button>
        <button class="nav-tab" onclick="showSection('shop')">🛒 Shop</button>
    </div>
    <div class="search-wrap" id="searchWrap">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Tìm anime..." autocomplete="off">
        </div>
        <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
    </div>
</nav>

<!-- ══════════════════════════════════════
     ANIME SECTION
══════════════════════════════════════ -->
<div class="section active" id="section-anime">

    <!-- Hero Banner -->
    <div class="hero-banner" id="heroBanner">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-content">
            <div class="hero-info">
                <span class="hero-badge">🔥 NỔI BẬT</span>
                <div class="hero-title" id="heroTitle">Đang tải...</div>
                <div class="hero-meta">
                    <span><span class="star">★</span> <span id="heroScore">—</span></span>
                    <span>📺 <span id="heroEps">—</span> tập</span>
                    <span id="heroStatus">—</span>
                </div>
                <div class="hero-desc" id="heroDesc">Đang tải thông tin anime...</div>
                <div class="hero-btns">
                    <button class="btn-watch" id="heroWatchBtn" onclick="watchHero()">▶ Xem Ngay</button>
                    <button class="btn-info" onclick="infoHero()">ℹ Thông Tin</button>
                </div>
            </div>
        </div>
        <div class="hero-dots" id="heroDots"></div>
    </div>

    <!-- Trending Grid -->
    <div class="content-area">
        <div class="section-header">
            <div class="section-title">ĐANG <span>HOT</span></div>
        </div>
        <div id="trendingGrid" class="loading-grid">
            <!-- skeletons -->
        </div>

        <div class="section-header" style="margin-top:40px">
            <div class="section-title">MỚI <span>CẬP NHẬT</span></div>
        </div>
        <div id="newGrid" class="loading-grid">
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════
     WATCH SECTION
══════════════════════════════════════ -->
<div class="section" id="section-watch">
    <button class="back-btn" onclick="backToAnime()">← Quay lại</button>
    <div class="watch-layout">
        <div>
            <div class="video-container" id="videoContainer">
                <div class="video-placeholder">
                    <div class="big-icon">🎬</div>
                    <p>Chọn tập để xem</p>
                </div>
            </div>
            <div class="video-info">
                <div class="video-title" id="watchTitle">—</div>
                <div class="video-meta">
                    <span id="watchEpLabel">—</span>
                    <span>★ <span id="watchScore">—</span></span>
                </div>
            </div>
        </div>
        <div class="watch-sidebar">
            <div class="sidebar-label">Nguồn phim</div>
            <div class="provider-tabs" id="providerTabs">
                <button class="provider-btn active" onclick="selectProvider('ANIMEVIETSUB',this)">AnimeVietSub</button>
                <button class="provider-btn" onclick="selectProvider('ANIMEVN',this)">AnimeVN</button>
                <button class="provider-btn" onclick="selectProvider('NINEANIME',this)">9Anime</button>
            </div>
            <div class="sidebar-label">Danh sách tập</div>
            <div class="episodes-panel">
                <div class="episodes-header">
                    <span>Tập phim</span>
                    <span class="episodes-count" id="episodeCount">—</span>
                </div>
                <div class="episodes-list" id="episodesList">
                    <div class="episodes-loading"><div class="spinner"></div></div>
                </div>
                <button class="episodes-load-more" id="loadMoreBtn" style="display:none" onclick="loadMoreEpisodes()">
                    ↓ Tải thêm tập
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════
     SHOP SECTION
══════════════════════════════════════ -->
<div class="section" id="section-shop">
    <div class="shop-banner">
        <div class="shop-banner-text">

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const API = 'http://localhost:8080';
const ANILIST_API = 'https://graphql.anilist.co';
// Fallback public AniList cover images (no key needed, CORS friendly)

let currentSection = 'anime';
let heroAnimes = [];
let heroIndex = 0;
let heroInterval;
let currentAnime = null;
let currentProvider = 'ANIMEVIETSUB';
let episodeOffset = 0;
let episodePageSize = 20;
let totalEpisodes = 0;
let allEpisodesLoaded = false;
let currentEpisodes = [];
let currentEpisodeData = null;
let searchTimeout;

// ═══════════════════════════════════════
// ANILIST GRAPHQL HELPERS
// ═══════════════════════════════════════
async function anilistQuery(query, variables) {
    const res = await fetch(ANILIST_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ query, variables })
    });
    const json = await res.json();
    return json.data;
}

const TRENDING_QUERY = `
query ($page:Int $perPage:Int) {
  Page(page:$page perPage:$perPage) {
    media(type:ANIME sort:TRENDING_DESC status_in:[RELEASING,FINISHED]) {
      id title { romaji native } coverImage { extraLarge large } bannerImage
      averageScore episodes status description(asHtml:false) genres
      nextAiringEpisode { episode }
    }
  }
}`;

const SEARCH_QUERY = `
query ($search:String $page:Int) {
  Page(page:$page perPage:8) {
    media(type:ANIME search:$search sort:POPULARITY_DESC) {
      id title { romaji native } coverImage { large } averageScore episodes status
    }
  }
}`;

// ═══════════════════════════════════════
// SECTION ROUTING
// ═══════════════════════════════════════
function showSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t => {
        if (t.textContent.toLowerCase().includes(name === 'anime' ? 'anime' : 'shop'))
            t.classList.add('active');
    });
    currentSection = name;
    if (name === 'shop') loadProducts();
}

function backToAnime() {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-anime').classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-tab')[0].classList.add('active');
}

// ═══════════════════════════════════════
// SKELETON LOADERS
// ═══════════════════════════════════════
function renderSkeletons(containerId, count = 6) {
    const c = document.getElementById(containerId);
    c.className = 'loading-grid';
    c.innerHTML = Array(count).fill(0).map(() => `
        <div class="skeleton">
            <div class="skeleton-img"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
        </div>
    `).join('');
}

// ═══════════════════════════════════════
// ANIME GRID RENDER
// ═══════════════════════════════════════
function renderAnimeCard(anime) {
    const title = anime.title?.romaji || anime.title?.native || 'Unknown';
    const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : '—';
    const eps = anime.episodes || (anime.nextAiringEpisode?.episode - 1) || '?';
    const img = anime.coverImage?.extraLarge || anime.coverImage?.large || '';
    const status = anime.status === 'RELEASING' ? '▶ Đang chiếu' : 
                   anime.status === 'FINISHED' ? '✓ Hoàn thành' : '';
    return `
        <div class="anime-card" onclick="openWatch(${anime.id})">
            ${status ? `<div class="anime-card-status">${status}</div>` : ''}
            ${img 
                ? `<img class="anime-card-img" src="${img}" alt="${title}" loading="lazy" onerror="this.style.display='none'">`
                : `<div class="anime-card-img-placeholder">🎌</div>`}
            <div class="card-overlay">
                <div class="card-play">▶</div>
            </div>
            <div class="anime-card-info">
                <div class="anime-card-title" title="${title}">${title}</div>
                <div class="anime-card-meta">
                    <span class="anime-card-score">★ ${score}</span>
                    <span class="anime-card-eps">${eps} tập</span>
                </div>
            </div>
        </div>`;
}

// ═══════════════════════════════════════
// HERO BANNER
// ═══════════════════════════════════════
function updateHero(anime) {
    const title = anime.title?.romaji || anime.title?.native || 'Unknown';
    const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : '—';
    const eps = anime.episodes || (anime.nextAiringEpisode?.episode - 1) || '?';
    const status = anime.status === 'RELEASING' ? '▶ Đang chiếu' : '✓ Hoàn thành';
    const bg = anime.bannerImage || anime.coverImage?.extraLarge || '';

    document.getElementById('heroBg').style.backgroundImage = bg ? `url(${bg})` : '';
    document.getElementById('heroTitle').textContent = title;
    document.getElementById('heroScore').textContent = score;
    document.getElementById('heroEps').textContent = eps;
    document.getElementById('heroStatus').textContent = status;
    document.getElementById('heroDesc').textContent = anime.description?.replace(/<[^>]*>/g,'').slice(0, 200) + '...' || '';
    document.getElementById('heroBanner').dataset.animeId = anime.id;
}

function setupHeroDots(animes) {
    const dots = document.getElementById('heroDots');
    dots.innerHTML = animes.map((_, i) => 
        `<button class="hero-dot ${i===0?'active':''}" onclick="setHero(${i})"></button>`
    ).join('');
}

function setHero(i) {
    heroIndex = i;
    updateHero(heroAnimes[i]);
    document.querySelectorAll('.hero-dot').forEach((d,idx) => d.classList.toggle('active', idx===i));
}

function watchHero() {
    const id = document.getElementById('heroBanner').dataset.animeId;
    if (id) openWatch(id);
}
function infoHero() {
    const id = document.getElementById('heroBanner').dataset.animeId;
    if (id) openWatch(id);
}

// ═══════════════════════════════════════
// LOAD TRENDING + NEW
// ═══════════════════════════════════════
async function loadTrending() {
    renderSkeletons('trendingGrid', 6);
    renderSkeletons('newGrid', 6);
    try {
        const [trendData, newData] = await Promise.all([
            anilistQuery(TRENDING_QUERY, { page: 1, perPage: 12 }),
            anilistQuery(TRENDING_QUERY, { page: 2, perPage: 12 })
        ]);
        const trending = trendData?.Page?.media || [];
        const newAnimes = newData?.Page?.media || [];

        // Hero
        heroAnimes = trending.slice(0, 5).filter(a => a.bannerImage || a.coverImage?.extraLarge);
        if (heroAnimes.length) {
            updateHero(heroAnimes[0]);
            setupHeroDots(heroAnimes);
            clearInterval(heroInterval);
            heroInterval = setInterval(() => {
                setHero((heroIndex + 1) % heroAnimes.length);
            }, 5000);
        }

        // Trending grid
        const tGrid = document.getElementById('trendingGrid');
        tGrid.className = 'anime-grid';
        tGrid.innerHTML = trending.slice(0, 12).map(renderAnimeCard).join('');

        // New grid
        const nGrid = document.getElementById('newGrid');
        nGrid.className = 'anime-grid';
        nGrid.innerHTML = newAnimes.slice(0, 12).map(renderAnimeCard).join('');
    } catch(e) {
        console.error(e);
        document.getElementById('trendingGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Không tải được dữ liệu</h3><p>Kiểm tra kết nối mạng</p></div>';
    }
}

// ═══════════════════════════════════════
// SEARCH + AUTOCOMPLETE
// ═══════════════════════════════════════
const searchInput = document.getElementById('searchInput');
const dropdown = document.getElementById('autocompleteDropdown');

searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = searchInput.value.trim();
    if (q.length < 2) { dropdown.classList.remove('show'); return; }
    dropdown.innerHTML = '<div class="autocomplete-loading"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div></div>';
    dropdown.classList.add('show');
    searchTimeout = setTimeout(() => doSearch(q), 350);
});

searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') { dropdown.classList.remove('show'); }
    if (e.key === 'Enter') {
        const q = searchInput.value.trim();
        if (q.length >= 2) doSearch(q);
    }
});

document.addEventListener('click', e => {
    if (!document.getElementById('searchWrap').contains(e.target))
        dropdown.classList.remove('show');
});

async function doSearch(query) {
    try {
        const data = await anilistQuery(SEARCH_QUERY, { search: query, page: 1 });
        const results = data?.Page?.media || [];
        if (!results.length) {
            dropdown.innerHTML = '<div class="autocomplete-loading">Không tìm thấy anime</div>';
            return;
        }
        dropdown.innerHTML = results.map(a => {
            const title = a.title?.romaji || a.title?.native || '';
            const score = a.averageScore ? `★ ${(a.averageScore/10).toFixed(1)}` : '';
            const eps = a.episodes ? `${a.episodes} tập` : '';
            const img = a.coverImage?.large || '';
            return `
                <div class="autocomplete-item" onclick="selectAnime(${a.id},'${title.replace(/'/g,"\\'")}')">
                    ${img ? `<img src="${img}" alt="${title}" onerror="this.style.display='none'">` : '<div style="width:38px;height:52px;background:var(--surface2);border-radius:4px;flex-shrink:0"></div>'}
                    <div class="autocomplete-item-info">
                        <div class="autocomplete-item-title">${title}</div>
                        <div class="autocomplete-item-meta">${[score, eps].filter(Boolean).join(' · ')}</div>
                    </div>
                </div>`;
        }).join('');
    } catch(e) {
        dropdown.innerHTML = '<div class="autocomplete-loading">Lỗi tìm kiếm</div>';
    }
}

function selectAnime(id, title) {
    searchInput.value = title;
    dropdown.classList.remove('show');
    openWatch(id);
}

// ═══════════════════════════════════════
// WATCH / EPISODES
// ═══════════════════════════════════════
async function openWatch(anilistId) {
    // Show watch section
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-watch').classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

    currentAnime = { id: anilistId };
    episodeOffset = 0;
    currentEpisodes = [];
    allEpisodesLoaded = false;
    currentEpisodeData = null;

    // Clear video
    document.getElementById('videoContainer').innerHTML = '<div class="video-placeholder"><div class="big-icon">🎬</div><p>Chọn tập để xem</p></div>';
    document.getElementById('watchTitle').textContent = 'Đang tải...';
    document.getElementById('watchEpLabel').textContent = '';
    document.getElementById('episodesList').innerHTML = '<div class="episodes-loading"><div class="spinner"></div></div>';
    document.getElementById('loadMoreBtn').style.display = 'none';
    document.getElementById('episodeCount').textContent = '...';

    // Load metadata from AniList for title/score
    try {
        const META_Q = `query($id:Int){Media(id:$id type:ANIME){id title{romaji native} averageScore episodes status}}`;
        const meta = await anilistQuery(META_Q, { id: parseInt(anilistId) });
        const m = meta?.Media;
        if (m) {
            const title = m.title?.romaji || m.title?.native || '';
            document.getElementById('watchTitle').textContent = title;
            document.getElementById('watchScore').textContent = m.averageScore ? (m.averageScore/10).toFixed(1) : '—';
            currentAnime.title = title;
            currentAnime.totalEps = m.episodes;
        }
    } catch(e) { console.warn('meta load failed', e); }

    // Load episodes from backend
    await loadEpisodes(true);
}

async function loadEpisodes(reset = false) {
    if (reset) {
        episodeOffset = 0;
        currentEpisodes = [];
        allEpisodesLoaded = false;
    }
    document.getElementById('loadMoreBtn').style.display = 'none';

    try {
        // Try backend first
        const url = `${API}/api/animes/${currentAnime.id}/episodes?provider=${currentProvider}&offset=${episodeOffset}`;
        const res = await fetch(url, {
            headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('accessToken') || '') }
        });

        if (res.ok) {
            const json = await res.json();
            const eps = json.data?.episodes || json.data?.results || json.data || [];
            renderEpisodes(eps, reset);
            // check if more available
            const total = json.data?.total || json.data?.totalCount || eps.length;
            document.getElementById('episodeCount').textContent = `${currentEpisodes.length} tập`;
            if (eps.length >= 20) {
                document.getElementById('loadMoreBtn').style.display = 'block';
                episodeOffset += 20;
            }
        } else {
            throw new Error('Backend not available');
        }
    } catch(e) {
        // Fallback: generate episode list from AniList total count
        const totalEps = currentAnime.totalEps || 12;
        const start = episodeOffset;
        const end = Math.min(start + 20, totalEps);
        const fakeEps = [];
        for (let i = start + 1; i <= end; i++) {
            fakeEps.push({ number: i, title: `Tập ${i}`, id: `ep-${currentAnime.id}-${i}` });
        }
        renderEpisodes(fakeEps, reset);
        document.getElementById('episodeCount').textContent = `${currentEpisodes.length}/${totalEps} tập`;
        if (end < totalEps) {
            document.getElementById('loadMoreBtn').style.display = 'block';
            episodeOffset += 20;
        }
    }
}

function renderEpisodes(eps, reset) {
    if (reset) currentEpisodes = [];
    currentEpisodes = [...currentEpisodes, ...eps];

    const list = document.getElementById('episodesList');
    if (reset) list.innerHTML = '';

    if (!currentEpisodes.length) {
        list.innerHTML = '<div class="empty-state" style="padding:40px 20px"><div class="icon" style="font-size:40px">📭</div><h3>Chưa có tập phim</h3><p>Thử đổi nguồn phim khác</p></div>';
        return;
    }

    const newItems = eps.map((ep, idx) => {
        const globalIdx = currentEpisodes.length - eps.length + idx;
        const epNum = ep.number || ep.episode || (globalIdx + 1);
        const epTitle = ep.title || ep.name || `Tập ${epNum}`;
        const epData = ep.id || ep.episodeData || JSON.stringify(ep);
        return `
            <div class="episode-item" id="ep-item-${globalIdx}" onclick="playEpisode(${globalIdx},'${encodeURIComponent(JSON.stringify(ep))}')">
                <div class="episode-num">${epNum}</div>
                <div class="episode-info">
                    <div class="episode-title">${epTitle}</div>
                    <div class="episode-sub">Tập ${epNum}</div>
                </div>
            </div>`;
    }).join('');

    list.insertAdjacentHTML('beforeend', newItems);
}

async function loadMoreEpisodes() {
    const btn = document.getElementById('loadMoreBtn');
    btn.textContent = '⏳ Đang tải...';
    btn.disabled = true;
    await loadEpisodes(false);
    btn.textContent = '↓ Tải thêm tập';
    btn.disabled = false;
}

async function playEpisode(idx, epJson) {
    // Mark active
    document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('active'));
    const item = document.getElementById(`ep-item-${idx}`);
    if (item) { item.classList.add('active'); item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

    const ep = JSON.parse(decodeURIComponent(epJson));
    const epNum = ep.number || ep.episode || (idx + 1);
    document.getElementById('watchEpLabel').textContent = `Tập ${epNum}`;

    const container = document.getElementById('videoContainer');
    container.innerHTML = '<div class="video-placeholder"><div class="spinner" style="width:48px;height:48px;border-width:4px"></div><p>Đang tải video...</p></div>';

    try {
        const episodeData = ep.id || ep.episodeData || ep.slug || String(ep.number || idx + 1);
        const url = `${API}/api/animes/stream?episodes=${encodeURIComponent(episodeData)}&provider=${currentProvider}`;
        const res = await fetch(url, {
            headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('accessToken') || '') }
        });

        if (res.ok) {
            const json = await res.json();
            const streamUrl = json.data?.url || json.data?.sources?.[0]?.url || json.data?.m3u8 || json.data?.link;
            if (streamUrl) {
                container.innerHTML = `<iframe src="${streamUrl}" allowfullscreen allow="autoplay"></iframe>`;
                return;
            }
        }
        throw new Error('No stream URL');
    } catch(e) {
        // Fallback: show iframe with public anime streaming search
        const title = encodeURIComponent((currentAnime.title || '') + ' episode ' + epNum);
        container.innerHTML = `
            <div class="video-placeholder">
                <div class="big-icon">⚠️</div>
                <p style="color:var(--text-dim);font-size:13px;text-align:center;padding:0 20px">
                    Không thể stream trực tiếp.<br>
                    <strong style="color:var(--text)">Tập ${epNum}</strong> — Vui lòng kết nối backend hoặc đổi nguồn phim.
                </p>
                <button class="btn-watch" style="margin-top:12px" onclick="window.open('https://animesaturn.cx/search?q=${title}','_blank')">
                    🔗 Tìm trên web
                </button>
            </div>`;
    }
}

function selectProvider(provider, btn) {
    currentProvider = provider;
    document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (currentAnime) loadEpisodes(true);
}

            <div class="product-info">
                <div class="product-name">${p.name}</div>
                <div class="product-anime">📺 ${p.anime}</div>
                <div class="product-footer">
                    <span class="product-price">${p.price.toLocaleString('vi-VN')}đ</span>
                    <button class="product-add" onclick="event.stopPropagation();addToCart(${p.id})">+</button>
                </div>
            </div>
        </div>
    `).join('');
}

function addToCart(id) {
    const p = PRODUCTS.find(x => x.id === id);
    if (p) showToast(`🛒 Đã thêm "${p.name}" vào giỏ!`);
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let toastTimer;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadTrending();
</script>
</body>
</html>
